<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Body Angle Measurer</title>
    <link rel="stylesheet" href="/static_body/style.css">
</head>
<body>
    <div class="container">
        <h1>Body Angle Measurer</h1>
        
        <div class="controls">
            <button id="startBtn" class="btn btn-primary">Start</button>
            <button id="stopBtn" class="btn btn-danger" disabled>Stop</button>
        </div>
        
        <div class="video-container">
            <img id="videoStream" src="" alt="Video stream">
            <div id="status" class="status">Waiting for connection...</div>
        </div>
        
        <div class="info-panel">
            <h2>Measurements</h2>
            <div class="info-item">
                <span>Angle (degrees):</span>
                <span id="distanceValue" class="value">--</span>
            </div>
        </div>
    </div>
    
    <script src="/static_body/app.js"></script>
</body>
</html>
